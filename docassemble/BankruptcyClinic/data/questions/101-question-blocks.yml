      % if i == 0:
      <strong>Debtor 1 Info</strong>
      % else:
      <strong>Debtor 2 (Spouse) Info</strong>
      % endif
  - First Name: debtor[i].name.first
  - Middle Name: debtor[i].name.middle
    required: False
  - Last Name: debtor[i].name.last
  - Suffix: debtor[i].name.suffix
    required: False
  - note: <strong>Address</strong>
  - Address: debtor[i].address.address
  - City: debtor[i].address.city
  - State: debtor[i].address.state
    input type: dropdown
    code: get_bk_states_list()
    datatype: str 
  - Zip Code: debtor[i].address.zip
    datatype: text
    minlength: 5
    maxlength: 5
  - County: debtor[i].address.county
    input type: dropdown
    # Server-side choice list of every supported county (NE + SD). This keeps
    # the dropdown populated and the submitted value valid even after a
    # validation-error re-render — previously the list was just ["N/A"] and the
    # JS that filled it on state-change did NOT re-run on re-render, leaving the
    # field empty so filers were stuck and had to type "N/A" (Phil/Roxanne). The
    # `check in: update_counties` below still narrows the list to the chosen
    # state the moment the state changes, for a cleaner pick.
    code: |
      ['N/A'] + county_list('Nebraska') + county_list('South Dakota')
    datatype: str
  - field: hidden_county
    input type: hidden
    default: ""
  - Has separate mailing address: debtor[i].has_other_mailing_address
    datatype: yesno
  - Mail Address/PO Box: debtor[i].mailing_street
    show if: debtor[i].has_other_mailing_address
    required: False
  - Mail City: debtor[i].mailing_city
    show if: debtor[i].has_other_mailing_address
    required: False
  - Mail State: debtor[i].mailing_state
    input type: dropdown
    code: get_bk_states_list()
    datatype: str
    show if: debtor[i].has_other_mailing_address
    required: False
  - Mail Zip: debtor[i].mailing_zip
    datatype: text
    minlength: 5
    maxlength: 5
    show if: debtor[i].has_other_mailing_address
    required: False
  - ID Type: debtor[i].tax_id.tax_id_type
    input type: radio
    choices:
      - Social Security Number: 1
      - Individual Taxpayer Identification Number: 2
  - Tax ID: debtor[i].tax_id.tax_id
    show if:
      variable: debtor[i].tax_id.tax_id_type
      is: 2
    required: False
  - SSN: debtor[i].tax_id.tax_id
    show if:
      variable: debtor[i].tax_id.tax_id_type
      is: 1
    required: False
  - note: |
      <script>
        // Handle dynamic county population based on state selection
        $(document).on('daPageLoad', function() {
          // This daPageLoad handler PERSISTS across ajax screen swaps, so it
          // fires on every later page too. Guard the H1 read (some pages have
          // none) and match ONLY the two debtor-identity headings ("Basic
          // Identity and Contact Information" / "Spouse / Joint Debtor —
          // Identity and Contact Information"). The old fallback match on
          // "Tell the court about" made this fire on every claim screen,
          // where its get_interview_variables() call re-assembled the
          // interview server-side and made the filer's next submit STALE —
          // silently discarded input (William/ERLS + flaky delete-all spec,
          // June 2026).
          var h1s = document.getElementsByTagName("H1");
          var questionPage = h1s.length ? h1s[0].innerHTML : "";
          if (questionPage.includes("Identity and Contact Information")) {
            var stateDropdown = document.getElementById(btoa("debtor[${ i }].address.state").replace(/=/g,""));
            var countyDropdown = document.getElementById(btoa("debtor[${ i }].address.county").replace(/=/g,""));
            var hiddenCountyField = document.getElementById(btoa("hidden_county").replace(/=/g,""));
            
            if (stateDropdown && countyDropdown) {
              // Trigger change event if state is already selected
              if (stateDropdown.value !== "") {
                stateDropdown.dispatchEvent(new Event('change'));
              }
              
              // Fetch and display the county
              var xhr = get_interview_variables();
              xhr.done(function(response) {
                var state, county;
                if (response.variables['debtor[${ i }].address.state'] && response.variables['debtor[${ i }].address.state'].length > 0) {
                  state = response.variables['debtor[${ i }].address.state'];
                }
                if (response.variables['debtor[${ i }].address.county'] && response.variables['debtor[${ i }].address.county'].length > 0) {
                  county = response.variables['debtor[${ i }].address.county'];
                }
                
                // Update the state dropdown and trigger the 'change' event
                if (state && state.length > 0) {
                  stateDropdown.value = state;
                  stateDropdown.dispatchEvent(new Event('change'));
                }
                
                // Use a mutation observer to watch for county dropdown population
                const observer = new MutationObserver(function(mutations) {
                  mutations.forEach(function(mutation) {
                    // Check if "N/A" is no longer the only option
                    const naOption = countyDropdown.querySelector('option[value="N/A"]');
                    if (!naOption || countyDropdown.options.length > 1) {
                      observer.disconnect(); // Stop observing
                      if (county) {
                        countyDropdown.value = county; // Set the county value
                      }
                    }
                  });
                });
                
                // Observe changes to the county dropdown
                observer.observe(countyDropdown, { childList: true, subtree: true });
              });
            }
          }
        });
      </script>

validation code: |
  import re
  # Issue #63: city / ZIP format validation
  city_err = is_valid_city(debtor[i].address.city)
  if city_err is not True:
    validation_error(city_err, field="debtor[i].address.city")
  zip_err = is_valid_zip(debtor[i].address.zip)
  if zip_err is not True:
    validation_error(zip_err, field="debtor[i].address.zip")
  if getattr(debtor[i], 'has_other_mailing_address', False):
    m_city_err = is_valid_city(debtor[i].mailing_city)
    if m_city_err is not True:
      validation_error(m_city_err, field="debtor[i].mailing_city")
    m_zip_err = is_valid_zip(debtor[i].mailing_zip)
    if m_zip_err is not True:
      validation_error(m_zip_err, field="debtor[i].mailing_zip")
  # SSN / ITIN format — accept with OR without hyphens (Phil/Roxanne: a missing
  # hyphen produced a hard error), then normalize to XXX-XX-XXXX for storage.
  if debtor[i].tax_id.tax_id:
    _digits = re.sub(r'\D', '', debtor[i].tax_id.tax_id)
    if len(_digits) != 9:
      validation_error("Please enter a 9-digit number — e.g. 123-45-6789 (hyphens optional).", field="debtor[i].tax_id.tax_id")
    elif debtor[i].tax_id.tax_id_type == 2 and not _digits.startswith('9'):
      validation_error("ITIN must start with the digit 9.", field="debtor[i].tax_id.tax_id")
    else:
      debtor[i].tax_id.tax_id = _digits[:3] + '-' + _digits[3:5] + '-' + _digits[5:]
  # Roxanne UAT (June 2026): a joint filing accepted the identical name + SSN
  # for both debtors. Debtor 2 must be a different person than Debtor 1.
  if i == 1:
    _d1_digits = re.sub(r'\D', '', getattr(debtor[0].tax_id, 'tax_id', '') or '')
    _d2_digits = re.sub(r'\D', '', debtor[i].tax_id.tax_id or '')
    if _d1_digits and _d2_digits and _d1_digits == _d2_digits:
      validation_error("This SSN/ITIN is the same as Debtor 1's. Each spouse must enter their own tax ID.", field="debtor[i].tax_id.tax_id")
    _same_name = (
      str(debtor[i].name.first or '').strip().lower() == str(debtor[0].name.first or '').strip().lower()
      and str(debtor[i].name.last or '').strip().lower() == str(debtor[0].name.last or '').strip().lower()
      and str(getattr(debtor[i].name, 'middle', '') or '').strip().lower() == str(getattr(debtor[0].name, 'middle', '') or '').strip().lower()
    )
    if _same_name and not (_d1_digits and _d2_digits):
      validation_error("Debtor 2 has the same name as Debtor 1. Enter your spouse's own name here — or, if you both truly share the same full name, enter each person's SSN/ITIN so the court can tell you apart.", field="debtor[i].name.first")
