id: poverty_calc
code: |
  def _num(v):
    """Convert None/empty string/non-numeric values to 0"""
    if v is None or v == '':
      return 0
    try:
      return float(v)
    except (TypeError, ValueError):
      return 0
  _overall = 0
  for _idx, debt in enumerate(debtor):
    _ded_var = 'debtor[' + str(_idx) + '].income.other_deduction_amount'
    _month_var = 'debtor[' + str(_idx) + '].income.other_monthly_amount'
    _other_ded = _num(value(_ded_var)) if defined(_ded_var) else 0
    _other_month = _num(value(_month_var)) if defined(_month_var) else 0
    # Use getattr() so a debtor who never sees a given income/payroll/deduction
    # screen (e.g. an unemployed debtor skips the payroll + deduction pages)
    # doesn't trigger an undefined-variable crash here. Missing == 0.
    def _gi(_d, _a):
      return _num(getattr(_d.income, _a, 0))
    _income_total = (_gi(debt, 'net_rental_business') + _gi(debt, 'family_support') + _gi(debt, 'interest_and_dividends') + _gi(debt, 'unemployment') + _gi(debt, 'social_security') + _gi(debt, 'other_govt_assist') + _gi(debt, 'pension') + _other_month)
    _paystub_total = (_gi(debt, 'income_amount_1') + _gi(debt, 'income_amount_2') + _gi(debt, 'income_amount_3') + _gi(debt, 'income_amount_4') + _gi(debt, 'income_amount_5') + _gi(debt, 'income_amount_6') + _gi(debt, 'overtime_pay_1') + _gi(debt, 'overtime_pay_2') + _gi(debt, 'overtime_pay_3'))
    _deductions = (_gi(debt, 'tax_deduction') + _gi(debt, 'mandatory_contributions') + _gi(debt, 'voluntary_contributions') + _gi(debt, 'fund_loans') + _gi(debt, 'insurance') + _gi(debt, 'domestic_support') + _gi(debt, 'union_dues') + _other_ded)
    _overall += _income_total + _paystub_total - _deductions
  overallIncome = _overall
  # DOJ Median Family Income lookup — table + math live in objects.py
  # get_median_family_income() (single source, also used to define
  # monthly_income.median_income for the 122A form).
  _household_size = _num(value('monthly_income.median_dependents')) if defined('monthly_income.median_dependents') else 1
  if _household_size < 1:
    _household_size = 1
  # Prefer the state the debtor confirmed on the median-income screen (122A);
  # fall back to the petition address state (e.g. when this runs for the
  # fee-waiver eligibility note before the means test).
  if defined('monthly_income.median_state') and value('monthly_income.median_state'):
    _state = str(value('monthly_income.median_state')).lower()
  else:
    _state = str(debtor[0].address.state).lower() if defined('debtor[0].address.state') else 'nebraska'
  # Fee waiver (28 U.S.C. 1930(f)): a Chapter 7 fee may be waived only if income
  # is below 150% of the federal poverty guideline for the household size (NOT
  # the means-test median family income, which is much higher) — William Franck,
  # ERLS, June 2026. overallIncome is monthly, so annualize before comparing.
  annualIncome = overallIncome * 12
  povertyThreshold150 = get_poverty_guideline(_household_size) * 1.5
  feeWaiverLikely = annualIncome < povertyThreshold150

