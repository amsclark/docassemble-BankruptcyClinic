id: payment_method
question: |
  How are you planning on paying the fee?
fields:
  - Payment Method: case.payment_method
    input type: radio
    choices:
      - I will pay the entire fee when I file my petition: 1
      - I need to pay the fee in installments: 2
      - I request that my fee be waived: 3
under: |
  Note:

  Your estimated annual household income is: ${ currency(annualIncome) }

  150% of the federal poverty guideline for a household of ${ int(monthly_income.median_dependents) } is: ${ currency(povertyThreshold150) }

  % if feeWaiverLikely:
  Based on income, you may qualify to have the filing fee waived (a judge still must approve it, and only if you also cannot pay in installments).
  % else:
  Your income appears to be above 150% of the poverty line, so a fee waiver is unlikely. You may still be able to pay the fee in installments.
  % endif

  If you choose to pay the entire fee please check with the clerk's office in your local court for more details about how you may pay.

  Be aware, you may only request that your fee be waived if you are filing for Chapter 7. By law, a judge may, but is not required to, waive your fee, and may do so only if your income is less than 150% of the official poverty line that applies to your family size and you are unable to pay the fee in installments.
section: case_det
