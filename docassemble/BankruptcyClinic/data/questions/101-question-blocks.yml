#Part 5: Explain Your Efforts to Receive a Briefing About Credit Counseling
table: counseling_table
rows: debtor
columns:
  - Counseling Status: row_item.counseling.counseling_type_name
  - Reason: row_item.counseling.not_required_reason
edit:
  - counseling.counseling_type
  - counseling.not_required_reason
---
id: counseling
question: |
  Has ${ debtor[i].name } received credit counseling?
subquestion: |
  The law requires that you receive a briefing about credit counseling before you file for bankruptcy.
fields:

 - Credit counseling status: debtor[i].counseling.counseling_type
   choices:
     - I received a briefing from an approved credit counseling agency within the 180 days before I filed this bankruptcy petition, and I received a certificate of completion.: 1
     - I received a briefing from an approved credit counseling agency within the 180 days before I filed this bankruptcy petition, but I do not have a certificate of completion.: 2
     - I was unable to receive a briefing due to exigent circumstances that merit a temporary waiver of the requirement.: 3
     - I am not required to receive a briefing because of incapacity, disability, or active military duty.: 4
 - What date did you take the class?: debtor[i].counseling.counseling_date
   datatype: date
   required: False
   show if:
     variable: debtor[i].counseling.counseling_type
     is: '1'
validation code: |
  # Roxanne UAT (June 2026): a certificate dated outside the statutory window
  # (11 U.S.C. § 109(h): briefing within 180 days before filing) was accepted.
  if str(debtor[i].counseling.counseling_type) == '1' and defined('debtor[i].counseling.counseling_date') and debtor[i].counseling.counseling_date:
    _days_ago = date_difference(starting=debtor[i].counseling.counseling_date, ending=today()).days
    if _days_ago < 0:
      validation_error("The counseling date cannot be in the future.", field="debtor[i].counseling.counseling_date")
    elif _days_ago > 180:
      validation_error("This counseling date is more than 180 days ago. The law requires the credit counseling briefing within the 180 days before you file. If you took the class more than 180 days ago, you will need to complete it again before filing.", field="debtor[i].counseling.counseling_date")
section: credit_counsel
---
id: counseling_not_required
question: |
  Reason credit briefing is not required
field: debtor[i].counseling.not_required_reason
choices:
  - Incapacity: 1
  - Disability: 2
  - Active duty: 3
section: credit_counsel
---
id: counseling_final
event: counseling_final
question: |
  Credit Counseling Summary
subquestion: |
  ${ counseling_table }

continue button field: counseling_final
section: credit_counsel
---
id: credit_counsel_review
event: credit_counsel
section: credit_counsel
question: |
  Review Credit Counseling Choices
review:
  - note: |
      ${ counseling_table }
