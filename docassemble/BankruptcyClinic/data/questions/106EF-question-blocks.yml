  collateral and aren't priority debts — for example **credit cards, medical
  bills, personal loans, and most court judgments**. Almost every filer has at
  least one. List each creditor you owe below; they appear on **Schedule F**.

  If you truly have none:
  ${ action_button_html(url_action('no_nonpriority_claims'), label='I have no unsecured debts to list', color='secondary') }
