# "I have no unsecured debts" escape on the Schedule F claim screen
# (William Franck / ERLS, June 2026: the gate is skipped per the May clinic
# decision (PR #91), but a filer with NO unsecured debts had no way past the
# blank required claim — docassemble shows no Delete button on a single row).
event: no_nonpriority_claims
code: |
  prop.nonpriority_claims.clear()
  mark_list_emptied(prop.nonpriority_claims)
---
id: schedule_ef_review
event: schedule_ef
section: schedule_ef
question: |
  Review Unsecured Claims
review:
  - note: |
      <br>
      ### Priority Unsecured Claims
      % if len(prop.priority_claims) > 0:
        ${ prop_priority_claims_table }
        ${ prop.priority_claims.add_action() }
      % else:
        No priority claims listed
        ${ prop.priority_claims.add_action() }
      % endif
      <br>
      ### Nonpriority Unsecured Claims
      % if len(prop.nonpriority_claims) > 0:
        ${ prop_nonpriority_claims_table }
        ${ prop.nonpriority_claims.add_action() }
      % else:
        No nonpriority claims listed
        ${ prop.nonpriority_claims.add_action() }
      % endif
