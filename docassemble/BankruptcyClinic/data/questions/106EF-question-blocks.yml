---
id: priority_unsecured_claims_any_exist
section: schedule_ef
question: |
  Do you have any PRIORITY unsecured debts?
subquestion: |
  Priority debts are listed on **Schedule E** and include **tax debt**, **child
  support**, **alimony / spousal support**, and certain other obligations the
  law treats as priority. You will list ordinary unsecured debts (credit cards,
  medical bills, etc.) on the next screen.
yesno: prop.priority_claims.there_are_any
---
id: priority_unsecured_claims_add_another
section: schedule_ef
question: |
  Do you have any more priority unsecured debts (tax, child support, alimony, etc.)?
yesno: prop.priority_claims.there_is_another
under: |
  ${ prop_priority_claims_table }
---
id: priority_unsecured_claim_details
section: schedule_ef
question: |
  Tell the court about a priority unsecured claim
subquestion: |
  This screen is for **PRIORITY unsecured debts** — they appear on
  **Schedule E** and include **tax debt** (IRS, state revenue departments),
  **child support**, **alimony / spousal support**, and certain other
  obligations the law treats as priority. Enter each priority creditor and the
  amount you owe. You will list ordinary unsecured debts (credit cards, medical
  bills, personal loans, etc.) on the **next** screen — those go on Schedule F.
allowed to set:
  - prop.priority_claims[i].complete
fields:
  - Creditor's Name: prop.priority_claims[i].name
  - Address/PO Box: prop.priority_claims[i].street
  - City: prop.priority_claims[i].city
  - State: prop.priority_claims[i].state
    input type: dropdown
    code: get_all_us_states()
  - Zip: prop.priority_claims[i].zip
    datatype: text
    minlength: 5
    maxlength: 5
  - note: Details about debt
  - Who incurred the debt?: prop.priority_claims[i].who
    choices:
      code: |
        (['Debtor 1 only',
          'At least one of the debtors and another']
         if (not defined('debtor')) or len(debtor) != 2 else
         ['Debtor 1 only',
          'Debtor 2 only',
          'Debtor 1 and Debtor 2 only',
          'At least one of the debtors and another'])
  - Account number: prop.priority_claims[i].account_number
    required: False
  - When was the debt incurred?: prop.priority_claims[i].date_incurred
    datatype: date
    required: False
  - note: As of the date you file, the claim is
  - Contingent: prop.priority_claims[i].contingent
    datatype: yesno
  - Unliquidated: prop.priority_claims[i].unliquidated
    datatype: yesno
  - Disputed: prop.priority_claims[i].disputed
    datatype: yesno
  - Type of priority claim: prop.priority_claims[i].type
    choices:
      - Child support: Domestic support obligations
      - Alimony / spousal support: Domestic support obligations
      - Tax debt (federal, state, or local): Taxes and certain other debts you owe the government
      - Claim for death or personal injury while you were intoxicated: Claims for death or personal injury while you were intoxicated
      - Other priority debt: Other
  - Specify other unsecured claim type: prop.priority_claims[i].other_type
    required: False
    show if:
      variable: prop.priority_claims[i].type
