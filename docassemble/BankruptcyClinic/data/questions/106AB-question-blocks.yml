code: |
  # Compute exemption totals from all property items
  import json as _json
  _debtor_state = debtor[0].address.state if defined('debtor[0].address.state') else 'Nebraska'
  # Joint filings stack exemption caps per debtor (11 U.S.C. § 522(m)).
  _num_debtors = len(debtor) if defined('debtor.gathered') and debtor.gathered else 1
  exemption_totals = compute_exemption_totals(prop, _debtor_state, _num_debtors)
  exemption_totals_json = _json.dumps(exemption_totals)
---
features:
  javascript:
    - exemptions.js
    - exemption-tracker.js
  css: bootstrap-theme.css
---
id: real_property_interest_details
section: schedule_ab
question: |
  Tell the court about the property interest.
subquestion: |
  <div id="exemption-tracker-data" style="display:none">${ exemption_totals_json }</div>
#right: |
#  Current Exemption Summary.
### # Name           |Limit            |Amount
#  ---------------|-----------------|-----------------
#  % for item in tbl_data():
#  ${ item['name'] } | ${ item['limit'] } | ${ item['amount'] }
#  % endfor
script: |
  <script>
    // Safely check for exemptions data
    try {
      checkQuestionExemptions(
        "prop.interests[i].is_claiming_exemption",
        "prop.interests[i].claiming_sub_100",
        "prop.interests[i].current_owned_value",
        "prop.interests[i].exemption_value",
        "prop.interests[i].exemption_laws",
        "prop.interests[i].exemption_value_2",
        "prop.interests[i].exemption_laws_2",
        "prop.interests[i].state");
    } catch(e) {
      console.log("Error in exemption check:", e);
    }
  </script>
#code: |
#  # Set complete attribute to true to prevent looping
#  prop.interests[i].complete = True
continue button field: prop.interests[i].complete
allowed to set:
  - prop.interests[i].complete
validation code: |
  # Calculate owned value based on loan status
  if hasattr(prop.interests[i], 'has_loan') and prop.interests[i].has_loan:
    if not hasattr(prop.interests[i], 'current_owed_amount'):
      prop.interests[i].current_owed_amount = 0
    prop.interests[i].current_owned_value = prop.interests[i].current_value - prop.interests[i].current_owed_amount
  else:
    prop.interests[i].current_owned_value = prop.interests[i].current_value
  # Issue #63: city / ZIP format validation
  city_err = is_valid_city(prop.interests[i].city)
  if city_err is not True:
    validation_error(city_err, field="prop.interests[i].city")
  zip_err = is_valid_zip(prop.interests[i].zip)
  if zip_err is not True:
    validation_error(zip_err, field="prop.interests[i].zip")
fields:
  - Street: prop.interests[i].street
  - City: prop.interests[i].city
  - State: prop.interests[i].state
    input type: dropdown
    code: get_all_us_states()
  - Zip: prop.interests[i].zip
    datatype: text
    minlength: 5
    maxlength: 5
  - County: prop.interests[i].county
  - note: |
      <br><br>
      Tell the court about the value and interest in the property.
  - What is the property: prop.interests[i].type
    datatype: checkboxes
    choices:
      - Single-family home
      - Duplex or Multi-unit building
      - Condominium or cooperative
      - Manufactured or mobile home
      - Land
      - Investment property
      - Timeshare
      - Other
  - Other property type: prop.interests[i].other_type
    show if: prop.interests[i].type["Other"]
    required: False
  - Who has an interest in the property?: prop.interests[i].who
    input type: radio
    choices:
      code: |
        (['Debtor 1 only',
          'At least one of the debtors and another']
         if (not defined('debtor')) or len(debtor) != 2 else
         ['Debtor 1 only',
          'Debtor 2 only',
          'Debtor 1 and Debtor 2 only',
          'At least one of the debtors and another'])
  - Current property value: prop.interests[i].current_value
    datatype: currency
  - Do you have a mortgage/loan on the property?: prop.interests[i].has_loan
    datatype: yesno
  - How much do you owe on the loan?: prop.interests[i].current_owed_amount
    datatype: currency
    show if: prop.interests[i].has_loan
    required: False
  - Describe the nature of your ownership interest: prop.interests[i].ownership_interest
    datatype: combobox
    choices:
      - Fee Simple
      - Joint Tenant
      - Life Estate
      - Equitable Interest
      - Future Interest
      - Tenancy by the Entireties
      - Tenants in Common
  - Is this community property?: prop.interests[i].is_community_property
    datatype: yesnoradio
  - Other information about item, such as local property identification number: prop.interests[i].other_info
    required: False
  - Claiming Exemption?: prop.interests[i].is_claiming_exemption
    datatype: yesnoradio
  - note: First Exemption
    show if: prop.interests[i].is_claiming_exemption
  - Specific laws that allow exemption: prop.interests[i].exemption_laws
    choices:
      code: |
        get_exemption_choices_or_combined(exemption_filing_state,'real_property')
    show if: prop.interests[i].is_claiming_exemption
    required: False
  - Amount you're claiming as exempt: prop.interests[i].exemption_value
    datatype: currency
    help: |
      Enter the value you're claiming as exempt — the full owned value to claim
      100% of fair market value, or a smaller dollar amount for a partial claim.
    show if: prop.interests[i].is_claiming_exemption
    required: False
  - note: Second exemption (optional — only if a second law also applies)
    show if: prop.interests[i].is_claiming_exemption
  - Specific laws that allow exemption (second): prop.interests[i].exemption_laws_2
    choices:
      code: |
        get_exemption_choices_or_combined(exemption_filing_state, 'real_property')
    show if: prop.interests[i].is_claiming_exemption
    required: False
  - Amount you're claiming as exempt (second): prop.interests[i].exemption_value_2
    datatype: currency
    show if: prop.interests[i].is_claiming_exemption
    required: False
list collect: True
