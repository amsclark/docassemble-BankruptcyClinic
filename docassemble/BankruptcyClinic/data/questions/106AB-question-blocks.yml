modules:
  - docassemble.BankruptcyClinic.objects
---
code: |
  # Filing state that restricts the exemption dropdowns (clinic decision: filing
  # in Nebraska shows Nebraska exemptions, South Dakota shows SD). Derived from
  # the chosen district, then the debtor's address; falls back to '' which makes
  # get_exemption_choices_or_combined() show the combined NE+SD list.
  if defined('current_district') and 'south dakota' in str(current_district).lower():
    exemption_filing_state = 'South Dakota'
  elif defined('current_district') and 'nebraska' in str(current_district).lower():
    exemption_filing_state = 'Nebraska'
  elif defined('debtor[0].address.state'):
    exemption_filing_state = str(debtor[0].address.state)
  else:
    exemption_filing_state = ''
---
code: |
  # "Are you claiming less than 100% of fair market value?" is no longer asked
  # on the property pages (clinic feedback — confusing/premature). Derive it from
  # the entered exemption amount vs. the owned value via claiming_less_than_full().
  prop.interests[i].claiming_sub_100 = claiming_less_than_full(
    prop.interests[i].exemption_value if defined('prop.interests[i].exemption_value') else None,
    prop.interests[i].current_owned_value if defined('prop.interests[i].current_owned_value') else None)
---
id: schedule_ab_property_intro
event: property_intro
section: schedule_ab
question: |
  Please tell the court about your property.
subquestion: |
  In each category, separately list and describe items. List an asset only once. If an asset fits in more than one category, list the asset in the category where you think it fits best. If two married people are filing together, both are equally responsible for supplying correct information.

continue button field: property_intro
---
table: prop_interests_table
rows: prop.interests
