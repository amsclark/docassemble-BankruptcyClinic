id: vehicle_details
section: schedule_ab
question: |
  Tell the court about one of your vehicles.
subquestion: |
  Vehicles can include cars, vans, trucks, tractors, sport utility vehicles, motorcycles.
  <div id="exemption-tracker-data" style="display:none">${ exemption_totals_json }</div>
#right: |
#  Current Exemption Summary.
#
#  Name           |Limit            |Amount
#  ---------------|-----------------|-----------------
#  % for item in tbl_data():
#  ${ item['name'] } | ${ item['limit'] } | ${ item['amount'] }
#  % endfor
script: |
  <script>
    try {
      checkQuestionExemptions(
        "prop.ab_vehicles[i].is_claiming_exemption",
        "prop.ab_vehicles[i].claiming_sub_100",
        "prop.ab_vehicles[i].current_owned_value",
        "prop.ab_vehicles[i].exemption_value",
        "prop.ab_vehicles[i].exemption_laws",
        "prop.ab_vehicles[i].exemption_value_2",
        "prop.ab_vehicles[i].exemption_laws_2",
        "prop.ab_vehicles[i].state");
    } catch(e) {
      console.log("Error in vehicle exemption check:", e);
    }
  </script>
continue button field: prop.ab_vehicles[i].complete
allowed to set:
  - prop.ab_vehicles[i].complete
validation code: |
  if hasattr(prop.ab_vehicles[i], 'has_loan') and prop.ab_vehicles[i].has_loan:
    if not hasattr(prop.ab_vehicles[i], 'current_owed_amount'):
      prop.ab_vehicles[i].current_owed_amount = 0
    prop.ab_vehicles[i].current_owned_value = prop.ab_vehicles[i].current_value - prop.ab_vehicles[i].current_owed_amount
  else:
    prop.ab_vehicles[i].current_owned_value = prop.ab_vehicles[i].current_value
  # Issue #53: limit the Motor Vehicle exemption to one vehicle PER DEBTOR.
  # In a joint case each spouse is entitled to their own motor-vehicle
  # exemption (11 U.S.C. 522(m)), so only block a second claim when it is the
  # SAME debtor's vehicle. Jointly-owned / third-party vehicles are not blocked.
  def _claims_motor_vehicle(v):
    for attr in ('exemption_laws', 'exemption_laws_2'):
      val = getattr(v, attr, None)
      if val and 'motor vehicle' in str(val).lower():
        return True
    return False
  def _mv_owner(v):
    w = getattr(v, 'who', 'Debtor 1 only')
    if w == 'Debtor 1 only':
      return 'D1'
    if w == 'Debtor 2 only':
      return 'D2'
    return None  # shared or third-party ownership: do not enforce the limit
  def _vehicle_label(v, idx):
    _yr = getattr(v, 'year', '')
    try:
      _yr = str(int(float(_yr)))
    except (TypeError, ValueError):
      _yr = str(_yr or '')
    parts = [p for p in (_yr, str(getattr(v, 'make', '') or ''), str(getattr(v, 'model', '') or '')) if p]
    return ' '.join(parts).strip() or ('Vehicle #' + str(idx + 1))
  if prop.ab_vehicles[i].is_claiming_exemption and _claims_motor_vehicle(prop.ab_vehicles[i]):
    _cur_owner = _mv_owner(prop.ab_vehicles[i])
    if _cur_owner is not None:
      for j in range(i):
        prev = prop.ab_vehicles[j]
        if getattr(prev, 'is_claiming_exemption', False) and _claims_motor_vehicle(prev) and _mv_owner(prev) == _cur_owner:
          validation_error("The Motor Vehicle exemption may only be claimed for one vehicle per debtor. You already claimed it for " + _vehicle_label(prev, j) + ". Please choose a different exemption (for example, Wildcard) for this vehicle.")
fields:
  - Make: prop.ab_vehicles[i].make
  - Model: prop.ab_vehicles[i].model
  - Year: prop.ab_vehicles[i].year
    datatype: number
  - Approximate mileage: prop.ab_vehicles[i].milage
    datatype: number
  - Who has an interest in the property?: prop.ab_vehicles[i].who
    input type: radio
    choices:
      code: |
        (['Debtor 1 only',
          'At least one of the debtors and another']
         if (not defined('debtor')) or len(debtor) != 2 else
         ['Debtor 1 only',
          'Debtor 2 only',
          'Debtor 1 and Debtor 2 only',
          'At least one of the debtors and another'])
  - Current property value: prop.ab_vehicles[i].current_value
    datatype: currency
  - State where the vehicle is registered or titled: prop.ab_vehicles[i].state
    required: False
  - Do you have a loan or lien on the vehicle?: prop.ab_vehicles[i].has_loan
    datatype: yesno
  - How much do you owe on the loan?: prop.ab_vehicles[i].current_owed_amount
    datatype: currency
    show if: prop.ab_vehicles[i].has_loan
    required: False
  - Is this community property?: prop.ab_vehicles[i].is_community_property
    datatype: yesnoradio
  - Other information: prop.ab_vehicles[i].other_info
    required: false
    input type: area
  - Claiming Exemption?: prop.ab_vehicles[i].is_claiming_exemption
    datatype: yesnoradio
  - note: First Exemption
    show if: prop.ab_vehicles[i].is_claiming_exemption
  - Value of exemption being claimed: prop.ab_vehicles[i].exemption_value
    datatype: currency
    required: False
    show if: prop.ab_vehicles[i].is_claiming_exemption
  - Specific laws that allow exemption: prop.ab_vehicles[i].exemption_laws
    choices:
      code: |
        get_exemption_choices_or_combined(exemption_filing_state,'vehicle')
    show if: prop.ab_vehicles[i].is_claiming_exemption
    required: False
  - note: Second Exemption
    show if: prop.ab_vehicles[i].is_claiming_exemption
  - Value of exemption being claimed: prop.ab_vehicles[i].exemption_value_2
    datatype: currency
    show if: prop.ab_vehicles[i].is_claiming_exemption
    required: False
  - Specific laws that allow exemption: prop.ab_vehicles[i].exemption_laws_2
    choices:
      code: |
        get_exemption_choices_or_combined(exemption_filing_state,'vehicle')
    show if: prop.ab_vehicles[i].is_claiming_exemption
    required: False
list collect: True
