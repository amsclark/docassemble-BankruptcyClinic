  - Street: row_item.street
  - Property Type: row_item.type
  - Who has interest: row_item.who
  - Current Value: row_item.current_value
  - Current owned value: row_item.current_owned_value
edit:
  - street
  - type
  - who
  - current_value
  - current_owned_value
