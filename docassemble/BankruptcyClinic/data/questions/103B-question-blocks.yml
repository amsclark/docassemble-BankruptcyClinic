# Part 3 - Tell the court about your property
# Official Form 103B instruction for Part 3: "If you have already filled out
# Schedule A/B: Property (Official Form 106A/B) attach copies to this
# application and go to Part 4." This interview ALWAYS assembles Form 106A/B as
# part of the filing package, so Part 3 is no longer asked (Roxanne UAT, June
# 2026: the fee waiver made filers re-enter every asset). Cash, bank accounts,
# real estate and vehicles are factual copies derived from the Schedule A/B
# answers below (the ONLY generator of these variables — rule 6); "other
# assets" (q.15) and "money owed to you" (q.16) are intentionally left blank on
# the PDF — the attached schedules carry that detail.
code: |
  _fw_fa = getattr(prop, 'financial_assets', None)
  # Q10: cash on hand <- Schedule A/B "I have cash"
  if _fw_fa is not None and getattr(_fw_fa, 'has_cash', False):
    prop.cash_on_hand = getattr(_fw_fa, 'cash_value', 0) or 0
  else:
    prop.cash_on_hand = 0
  # Q11: bank accounts <- Schedule A/B deposits
  _fw_deps = list(getattr(getattr(_fw_fa, 'deposits', None), 'elements', [])) if _fw_fa is not None else []
  prop.has_bank_accounts = len(_fw_deps) > 0
  prop.accounts.clear()
  for _fw_k, _fw_dep in enumerate(_fw_deps):
    prop.accounts.appendObject()
    # The PDF builder buckets accounts as Checking / Savings / Other — fold the
    # Schedule A/B deposit types (e.g. "Certificates of deposit") into those.
    _fw_t = str(getattr(_fw_dep, 'type', '') or '')
    prop.accounts[_fw_k].type = _fw_t if _fw_t in ('Checking', 'Savings') else 'Other'
    prop.accounts[_fw_k].institution = str(getattr(_fw_dep, 'institution', ''))
    prop.accounts[_fw_k].amount = getattr(_fw_dep, 'amount', 0) or 0
    prop.accounts[_fw_k].complete = True
  prop.accounts.there_are_any = len(_fw_deps) > 0
  prop.accounts.gathered = True
  # Q12/Q13: home + other real estate <- Schedule A/B real-property interests
  _fw_interests = list(getattr(getattr(prop, 'interests', None), 'elements', []))
  prop.has_home = len(_fw_interests) > 0
  if prop.has_home:
    prop.mortgage_street = str(getattr(_fw_interests[0], 'street', ''))
    prop.mortgage_city = str(getattr(_fw_interests[0], 'city', ''))
    prop.mortgage_state = str(getattr(_fw_interests[0], 'state', ''))
    prop.mortgage_zip = str(getattr(_fw_interests[0], 'zip', ''))
    prop.mortgage_current_value = getattr(_fw_interests[0], 'current_value', 0) or 0
    prop.mortgage_amount_owed = getattr(_fw_interests[0], 'current_owed_amount', 0) or 0
  prop.has_other_real_estate = len(_fw_interests) > 1
  if prop.has_other_real_estate:
    prop.other_mortgage_street = str(getattr(_fw_interests[1], 'street', ''))
    prop.other_mortgage_city = str(getattr(_fw_interests[1], 'city', ''))
    prop.other_mortgage_state = str(getattr(_fw_interests[1], 'state', ''))
    prop.other_mortgage_zip = str(getattr(_fw_interests[1], 'zip', ''))
    prop.other_mortgage_current_value = getattr(_fw_interests[1], 'current_value', 0) or 0
    prop.other_mortgage_amount_owed = getattr(_fw_interests[1], 'current_owed_amount', 0) or 0
  # Q14: vehicles <- Schedule A/B vehicles (cars + other vehicles)
  _fw_cars = list(getattr(getattr(prop, 'ab_vehicles', None), 'elements', [])) + \
             list(getattr(getattr(prop, 'ab_other_vehicles', None), 'elements', []))
  prop.vehicles.clear()
  for _fw_k, _fw_car in enumerate(_fw_cars):
    prop.vehicles.appendObject()
    prop.vehicles[_fw_k].make = str(getattr(_fw_car, 'make', ''))
    prop.vehicles[_fw_k].model = str(getattr(_fw_car, 'model', ''))
    prop.vehicles[_fw_k].year = getattr(_fw_car, 'year', '')
    prop.vehicles[_fw_k].milage = getattr(_fw_car, 'milage', '')
    prop.vehicles[_fw_k].current_value = getattr(_fw_car, 'current_value', 0) or 0
    # current_owed_amount is show-if gated on has_loan — mirror the gate
    prop.vehicles[_fw_k].amount_owed = (getattr(_fw_car, 'current_owed_amount', 0) or 0) if getattr(_fw_car, 'has_loan', False) else 0
    prop.vehicles[_fw_k].complete = True
  prop.vehicles.there_are_any = len(_fw_cars) > 0
  prop.vehicles.gathered = True
  fee_waiver_part3_derived = True
---
#Part 4: Answer these additional questions
id: f103b_paid_for_services
section: waive_fee
question: |
  Who's paid for filing services?
fields:
  - note: |
      <br><br>
      Have you paid anyone for services for this case, including filling out this application, the bankruptcy filing package, or the schedules?
  - Paid?: additional.paid_for_services
    datatype: yesnoradio
  - Whom did you pay?: additional.paid_for_services_who
    datatype: checkboxes
    choices:
      - An attorney
      - A bankruptcy petition preparer, paralegal, or typing service
      - Someone else
    show if: additional.paid_for_services
    required: False
  - Describe who: additional.paid_for_services_who_describe
    show if: additional.paid_for_services
    required: False
  - How much?: additional.paid_for_services_amount
    datatype: currency
    show if: additional.paid_for_services
    required: False
  - note: |
      <br><br>
      Have you promised to pay or do you expect to pay someone for services for your bankruptcy case?
  - Promised to pay?: additional.promised_for_services
    datatype: yesnoradio
  - Whom did you pay?: additional.promised_for_services_who
    datatype: checkboxes
    choices:
      - An attorney
      - A bankruptcy petition preparer, paralegal, or typing service
      - Someone else
    show if: additional.promised_for_services
    required: False
  - Describe who: additional.promised_for_services_who_describe
    show if: additional.promised_for_services
    required: False
  - How much?: additional.promised_for_services_amount
    datatype: currency
    show if: additional.promised_for_services
    required: False
  - note: |
      <br><br>
      Has anyone paid someone on your behalf for services for this case?
  - Has anyone else paid on your behalf?: additional.behalf_for_services
    datatype: yesnoradio
  - Whom was paid?: additional.behalf_for_services_who
    datatype: checkboxes
    choices:
      - An attorney
      - A bankruptcy petition preparer, paralegal, or typing service
      - Someone else
    show if: additional.behalf_for_services
    required: False
  - Who paid?: additional.behalf_for_services_paid
    datatype: checkboxes
    choices:
      - Parent
      - Brother or sister
      - Friend
      - Pastor or clergy
      - Someone else
    show if: additional.behalf_for_services
    required: False
  - Other payer: additional.behalf_other_payer
    show if: additional.behalf_for_services
    required: False
  - How much was paid?: additional.behalf_for_services_amount
    datatype: currency
    show if: additional.behalf_for_services
    required: False
