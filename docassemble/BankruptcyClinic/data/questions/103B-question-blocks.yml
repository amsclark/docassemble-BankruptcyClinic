#Part 0 - Intro
id: f103b_q1_waive_fee_intro
section: waive_fee
event: waive_fee_intro
question: |
  Application to Have the Chapter 7 Filing Fee Waived
subquestion: |
  The fee for filing a bankruptcy case under chapter 7 is $335. Because you cannot afford to pay the entire fee now in full or in installments within 120 days, you are asking the court to waive your fee. After reviewing your application, the court may waive your fee, set a hearing for further investigation, or require you to pay the fee in installments.
continue button field: waive_fee_intro
---
#Part 1 - Tell the court about your family and your family's income
# Family-size checkboxes/counts are no longer asked here — they derive from the
# debtor list and the Schedule J dependents already gathered (Roxanne UAT,
# June 2026: the fee waiver re-asked information the filer had already given).
# See the fee_waiver_family_derived code block below.
id: f103b_q2_family_income
section: waive_fee
question: |
  Tell the court about your family's income
subquestion: |
  Your family includes you${ ', your spouse,' if len(debtor) > 1 else '' } and any dependents listed on Schedule J: Your Expenses — **${ family.total_number } ${ 'people' if family.total_number != 1 else 'person' } total** (${ family.dependent_count } dependent${ 's' if family.dependent_count != 1 else '' }), carried over from your earlier answers.

  We've pre-filled the income fields below from your Schedule I answers; review and adjust if needed.
fields:
  - note: |
      ### Income Information

      Make sure to include the value (if known) of any non-cash governmental assistance that you receive, such as food stamps (benefits under the Supplemental Nutrition Assistance Program) or housing subsidies.
  - Your income: family.you_income
    datatype: currency
    default: ${ debtor[0].income.income_amount_1 + debtor[0].income.overtime_pay_1 + debtor[0].income.net_rental_business + debtor[0].income.social_security + debtor[0].income.pension + debtor[0].income.unemployment + debtor[0].income.family_support + debtor[0].income.interest_and_dividends + debtor[0].income.other_govt_assist if defined('debtor[0].income.income_amount_1') else 0 }
  - Your spouse's income: family.spouse_income
    datatype: currency
    required: False
    default: ${ debtor[1].income.income_amount_1 + debtor[1].income.overtime_pay_1 + debtor[1].income.net_rental_business + debtor[1].income.social_security + debtor[1].income.pension + debtor[1].income.unemployment + debtor[1].income.family_support + debtor[1].income.interest_and_dividends + debtor[1].income.other_govt_assist if len(debtor) > 1 and defined('debtor[1].income.income_amount_1') else 0 }
  - Non-cash assistance: family.assistance_income
    datatype: currency
  - note: |
      <br><br>
      Tell the court about income changes and assistance
  - Received governmental assistance: family.governmental_assistance
    datatype: yesno
  - Explain: family.governmental_assistance_explain
    input type: area
    required: false
    show if: family.governmental_assistance
  - note: |
      <br><br>
      Do you expect your family's average monthly net income to increase or decrease by more       than 10% during the next 6 months?
  - Income Change: family.income_change
    datatype: yesno
  - Explain: family.income_change_explain
    input type: area
    required: False
    show if: family.income_change
  - note: |
      <br><br>
      Tell the court why you are unable to pay the filing fee in installments within 120 days. If you have some additional circumstances that cause you not to be able to pay your filing fee in installments, explain them.
  - Explain: family.cannot_pay_explain
    input type: area
---
# Form 103B Part 1 family size — derived, not asked (Roxanne UAT, June 2026).
# The ONLY generator for these variables (rule 6); int() so the PDF shows "3",
# not "3.0" (Roxanne UAT: household counts rendered with decimal points).
code: |
  family.you = True
  family.has_spouse = len(debtor) > 1
  if defined('debtor[0].expenses.dependents.gathered'):
    _fw_dep_count = len(debtor[0].expenses.dependents)
  else:
    _fw_dep_count = 0
  family.has_dependents = _fw_dep_count > 0
  family.dependent_count = int(_fw_dep_count)
  family.total_number = int(len(debtor) + _fw_dep_count)
  fee_waiver_family_derived = True
