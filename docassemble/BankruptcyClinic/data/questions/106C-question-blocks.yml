code: |
  # Auto-populate Schedule C from property items claiming exemptions
  # Only runs if properties haven't been gathered yet. Uses hasattr() throughout
  # to avoid triggering docassemble variable seeking.
  _auto_entries = []
  _line = 1
  # Real property
  if defined('prop.interests.gathered') and prop.interests.gathered:
    for _interest in prop.interests.elements:
      if hasattr(_interest, 'is_claiming_exemption') and _interest.is_claiming_exemption:
        _desc = str(getattr(_interest, 'street', '')) + ' ' + str(getattr(_interest, 'city', '')) + ', ' + str(getattr(_interest, 'state', ''))
        _val = getattr(_interest, 'current_owned_value', getattr(_interest, 'current_value', 0))
        _exemption = getattr(_interest, 'exemption_value', _val) if hasattr(_interest, 'exemption_value') else _val
        _laws = str(getattr(_interest, 'exemption_laws', '')) if hasattr(_interest, 'exemption_laws') else ''
        _law2 = str(getattr(_interest, 'exemption_laws_2', '')) if hasattr(_interest, 'exemption_laws_2') else ''
        if _law2:
          _laws = _laws + '; ' + _law2
        _auto_entries.append({'description': _desc.strip(), 'value': _val, 'exemption': _exemption, 'laws': _laws, 'line': _line})
      _line += 1
  # Vehicles
  if defined('prop.ab_vehicles.gathered') and prop.ab_vehicles.gathered:
    for _v in prop.ab_vehicles.elements:
      if hasattr(_v, 'is_claiming_exemption') and _v.is_claiming_exemption:
        _desc = str(getattr(_v, 'year', '')) + ' ' + str(getattr(_v, 'make', '')) + ' ' + str(getattr(_v, 'model', ''))
        _val = getattr(_v, 'current_owned_value', getattr(_v, 'current_value', 0))
        _exemption = getattr(_v, 'exemption_value', _val) if hasattr(_v, 'exemption_value') else _val
        _laws = str(getattr(_v, 'exemption_laws', '')) if hasattr(_v, 'exemption_laws') else ''
        _auto_entries.append({'description': _desc.strip(), 'value': _val, 'exemption': _exemption, 'laws': _laws, 'line': _line})
      _line += 1
  if defined('prop.ab_other_vehicles.gathered') and prop.ab_other_vehicles.gathered:
    for _v in prop.ab_other_vehicles.elements:
      if hasattr(_v, 'is_claiming_exemption') and _v.is_claiming_exemption:
        _desc = str(getattr(_v, 'year', '')) + ' ' + str(getattr(_v, 'make', '')) + ' ' + str(getattr(_v, 'model', ''))
        _val = getattr(_v, 'current_owned_value', getattr(_v, 'current_value', 0))
        _exemption = getattr(_v, 'exemption_value', _val) if hasattr(_v, 'exemption_value') else _val
        _laws = str(getattr(_v, 'exemption_laws', '')) if hasattr(_v, 'exemption_laws') else ''
        _auto_entries.append({'description': _desc.strip(), 'value': _val, 'exemption': _exemption, 'laws': _laws, 'line': _line})
      _line += 1
  # Household goods
  if hasattr(prop, 'household_goods_is_claiming_exemption') and prop.household_goods_is_claiming_exemption:
    _val = getattr(prop, 'household_goods_value', 0)
    _exemption = getattr(prop, 'household_goods_exemption_value', _val) if hasattr(prop, 'household_goods_exemption_value') else _val
    _laws = str(getattr(prop, 'household_goods_exemption_laws', '')) if hasattr(prop, 'household_goods_exemption_laws') else ''
    _auto_entries.append({'description': 'Household goods', 'value': _val, 'exemption': _exemption, 'laws': _laws, 'line': _line})

  # Pre-populate if we have entries and the list hasn't been gathered yet
  if _auto_entries and defined('prop.exempt_property.properties') and not prop.exempt_property.properties.gathered:
    prop.exempt_property.properties.clear()
    for _entry in _auto_entries:
      _item = prop.exempt_property.properties.appendObject()
      _item.description = _entry['description']
      _item.value = _entry['value']
      _item.not_full_exemption = True
      _item.exemption = _entry['exemption']
      _item.laws = _entry['laws']
      _item.line = _entry['line']
      _item.complete = True
    prop.exempt_property.properties.gathered = True
    prop.exempt_property.properties.there_are_any = True
  schedule_c_auto_populated = True
---
table: prop_exempt_table
rows: prop.exempt_property.properties
columns:
  - Description: row_item.description
  - Current Value: row_item.value
  - Exemption Amount: row_item.exemption
  - Laws: row_item.laws
  - Line: row_item.line
edit:
  - description
  - value
  - exemption
  - laws
  - line
---
id: exemption_type_selection
section: schedule_c
question: |
  Which set of exemptions are you claiming?
fields: 
  - no label: prop.exempt_property.exemption_type
    choices:
    - You are claiming state and federal nonbankruptcy exemptions.
    - You are claiming federal exemptions.
    # default: You are claiming federal exemptions.
---
id: exempt_property_any_exist
section: schedule_c
question: |
  Do you have any property to claim as exempt?
yesno: prop.exempt_property.properties.there_are_any
---
id: exempt_property_add_another
section: schedule_c
question: |
  Do you have any more property to claim as exempt?
yesno: prop.exempt_property.properties.there_is_another
under: |
  ${ prop_exempt_table }
---
id: exempt_property_details
section: schedule_c
question: |
  Tell us more about the property and claim for exemption
allowed to set:
  - prop.exempt_property.properties[i].complete
fields:
  - Description: prop.exempt_property.properties[i].description
    input type: area
    # default: NA
  - Current value of the portion you own: prop.exempt_property.properties[i].value
    datatype: currency
    # default: 200
  - Are you claiming less than 100% of fair market value?: prop.exempt_property.properties[i].not_full_exemption
    datatype: yesnoradio
    # default: True
  - Exemption being claimed: prop.exempt_property.properties[i].exemption
    datatype: currency
    # default: 300
    required: False
    show if: prop.exempt_property.properties[i].not_full_exemption
  - Specific laws that allow exemption: prop.exempt_property.properties[i].laws
    input type: area
    # default: NA
  - Schedule A/B line: prop.exempt_property.properties[i].line
    datatype: number
    # default: 4
list collect: True 
---
id: homestead_exemption
section: schedule_c
question: |
  Are you claiming a homestead exemption of more than $189,050?
subquestion: |
  (Subject to adjustment on 4/01/25 and every 3 years after that for cases filed on or after the date of adjustment.)
fields:
  - Claiming homestead exemption: prop.exempt_property.claim_homestead_exemption
    datatype: yesnoradio
    # default: True
  - Did you acquire the property within 1,215 days?: prop.exempt_property.homestead_within_timeframe
    datatype: yesnoradio
    required: False
    # default: False
    show if: prop.exempt_property.claim_homestead_exemption
---
id: schedule_c_review
event: schedule_c
section: schedule_c
question: |
  Review Exempt Property
review:
  - note: |
      <br>
      ### Exempt Property
      % if len(prop.exempt_property.properties) > 0:
        ${ prop_exempt_table }
        ${ prop.exempt_property.properties.add_action() }
      % else:
        No exempt property listed
        ${ prop.exempt_property.properties.add_action() }
      % endif
  - Revisit: prop.exempt_property.claim_homestead_exemption
    button: |
      % if prop.exempt_property.claim_homestead_exemption:
        Claiming Homestead Exemption: Yes
      % else:
        Claiming Homestead Exemption: No
      % endif
      % if prop.exempt_property.claim_homestead_exemption:
        % if prop.exempt_property.homestead_within_timeframe:
          Acquired within 1,215 days: Yes
        % else:
          Acquired within 1,215 days: No
        % endif
      % endif
---
code: |
  debtor_name = debtor[0].name.first + " " + debtor[0].name.middle + " " + debtor[0].name.last
  if len(debtor) > 1:
    debtor2_name = debtor[1].name.first + " " + debtor[1].name.middle + " " + debtor[1].name.last
  else:
    debtor2_name = ''
---
code: |
  sc = {}
  sc['debtor1_name_1'] = debtor_name
  sc['debtor1_name_2'] = debtor_name
  sc['debtor2_name_1'] = debtor2_name
  sc['case_number_1'] = case_number
  sc['case_number_2'] = case_number
  sc['bankruptcy_district'] = current_district
  sc['isAmended'] = amended_filing
  sc['isStateAndFederalExempt'] = True if prop.exempt_property.exemption_type == 'You are claiming state and federal nonbankruptcy exemptions.' else False
  sc['isFederalExempt'] = True if prop.exempt_property.exemption_type == 'You are claiming federal exemptions.' else False
  
  i = 1
  for pro in prop.exempt_property.properties:
    sc['desc'+str(i)] = pro.description
    sc['currOwnedVal'+str(i)] = currency(pro.value)
    sc['isCustExempt'+str(i)] = pro.not_full_exemption
    sc['custExemptVal'+str(i)] = pro.exemption
    sc['laws'+str(i)] = pro.laws
    sc['isFairMarket'+str(i)] = True if pro.not_full_exemption == True else False
    sc['line'+str(i)] = pro.line
    
    i += 1
  
  if prop.exempt_property.claim_homestead_exemption == True:
    sc['hasHomestead'] = True
    if prop.exempt_property.homestead_within_timeframe == True:
      sc['isWithinTime'] = True
    else:
      sc['notWithinTime'] = True
  else:
    sc['noHomestead'] = True
---
attachment:
  - name: Form 106C
    filename: form_b106c.pdf
    pdf template file: form_b_106c.pdf
    variable name: c_attach
    code: sc
